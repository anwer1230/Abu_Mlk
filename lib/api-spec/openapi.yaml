openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: shares
    description: Shareable repo edit links and pull request submissions
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /shares:
    get:
      operationId: listShareLinks
      tags: [shares]
      summary: List all share links (owner dashboard)
      responses:
        "200":
          description: List of share links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShareLink"
    post:
      operationId: createShareLink
      tags: [shares]
      summary: Create a new shareable edit link for a repo file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShareLinkInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareLink"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /shares/{slug}:
    get:
      operationId: getShareLink
      tags: [shares]
      summary: Get a share link's metadata and live file content (public)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Share link with current file content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareLinkWithContent"
        "404":
          description: Not found, inactive, or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateShareLink
      tags: [shares]
      summary: Update a share link (owner dashboard)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShareLinkUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareLink"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteShareLink
      tags: [shares]
      summary: Delete a share link (owner dashboard)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /repos/tree:
    get:
      operationId: getRepoTree
      tags: [shares]
      summary: Browse the files in a GitHub repo branch, to pick a file when creating a share link
      parameters:
        - name: owner
          in: query
          required: true
          schema:
            type: string
        - name: repo
          in: query
          required: true
          schema:
            type: string
        - name: branch
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of file paths in the repo branch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepoTree"
        "400":
          description: Could not read the repository
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /shares/{slug}/submissions:
    get:
      operationId: listSubmissions
      tags: [shares]
      summary: List pull request submissions for a share link (owner dashboard)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Submission"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createSubmission
      tags: [shares]
      summary: Submit an edit (public) — opens a pull request for review, never pushes directly
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmissionInput"
      responses:
        "201":
          description: Pull request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "404":
          description: Not found, inactive, or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ShareLink:
      type: object
      required:
        - id
        - slug
        - repoOwner
        - repoName
        - filePaths
        - baseBranch
        - title
        - description
        - isActive
        - expiresAt
        - createdAt
        - submissionCount
      properties:
        id:
          type: string
        slug:
          type: string
        repoOwner:
          type: string
        repoName:
          type: string
        filePaths:
          type: array
          items:
            type: string
          minItems: 1
          description: One or more repo-relative file paths bundled into this share link's editing session.
        baseBranch:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        isActive:
          type: boolean
        expiresAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        submissionCount:
          type: integer

    RepoFileContent:
      type: object
      required:
        - filePath
        - content
      properties:
        filePath:
          type: string
        content:
          type: string

    ShareLinkWithContent:
      allOf:
        - $ref: "#/components/schemas/ShareLink"
        - type: object
          required:
            - files
          properties:
            files:
              type: array
              items:
                $ref: "#/components/schemas/RepoFileContent"

    ShareLinkInput:
      type: object
      required:
        - repoOwner
        - repoName
        - filePaths
        - title
      properties:
        repoOwner:
          type: string
          minLength: 1
        repoName:
          type: string
          minLength: 1
        filePaths:
          type: array
          items:
            type: string
            minLength: 1
          minItems: 1
        baseBranch:
          type: string
        title:
          type: string
          minLength: 1
        description:
          type: string
        expiresAt:
          type: string
          format: date-time

    ShareLinkUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        isActive:
          type: boolean
        expiresAt:
          type: ["string", "null"]
          format: date-time

    Submission:
      type: object
      required:
        - id
        - shareLinkId
        - prUrl
        - prNumber
        - branchName
        - submitterName
        - note
        - createdAt
      properties:
        id:
          type: string
        shareLinkId:
          type: string
        prUrl:
          type: string
        prNumber:
          type: integer
        branchName:
          type: string
        submitterName:
          type: ["string", "null"]
        note:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    RepoTree:
      type: object
      required:
        - defaultBranch
        - files
      properties:
        defaultBranch:
          type: string
        files:
          type: array
          items:
            type: string

    SubmissionInput:
      type: object
      required:
        - files
      properties:
        files:
          type: array
          items:
            $ref: "#/components/schemas/RepoFileContent"
          minItems: 1
          description: Edited content for every file in the share link, all landing in a single pull request.
        submitterName:
          type: string
        note:
          type: string
