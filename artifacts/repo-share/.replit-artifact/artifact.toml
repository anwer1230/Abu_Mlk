kind = "web"
previewPath = "/"
title = "Repo Share Editor"
version = "1.0.0"
id = "artifacts/repo-share"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24308

[services.development]
run = "pnpm --filter @workspace/repo-share run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/repo-share", "run", "build" ]
serve = "static"
publicDir = "artifacts/repo-share/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24308"
BASE_PATH = "/"
